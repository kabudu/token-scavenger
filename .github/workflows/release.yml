name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version selection"
        required: true
        type: choice
        default: current
        options:
          - current
          - patch
          - minor
          - major

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Select version & tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        run: cargo install cargo-edit

      - name: Select release version
        id: bump
        run: |
          if [ "${{ github.event.inputs.bump_type }}" != "current" ]; then
            cargo set-version --bump ${{ github.event.inputs.bump_type }}
          fi

          NEW_VER=$(cargo metadata --format-version=1 --no-deps 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
          echo "new_version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "Preparing release v$NEW_VER"

          python3 scripts/changelog_release.py prepare \
            --file CHANGELOG.md \
            --version "$NEW_VER" \
            --date "$(date -u +%F)"

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Cargo.toml Cargo.lock CHANGELOG.md 2>/dev/null || git add Cargo.toml CHANGELOG.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: prepare release v$NEW_VER"
            git push origin HEAD:${{ github.ref_name }}
          fi

          if git rev-parse "v$NEW_VER" >/dev/null 2>&1 \
            || git ls-remote --exit-code --tags origin "refs/tags/v$NEW_VER" >/dev/null 2>&1; then
            if [ "${{ github.event.inputs.bump_type }}" = "current" ]; then
              echo "Tag v$NEW_VER already exists — reusing for current-version release"
              exit 0
            fi
            echo "Tag v$NEW_VER already exists — aborting"
            exit 1
          fi
          git tag "v$NEW_VER"
          git push origin "v$NEW_VER"

  build:
    name: Build (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Import Apple Developer ID certificate
        if: matrix.os == 'macos-latest'
        env:
          APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          if [ -z "$APPLE_DEVELOPER_ID_CERTIFICATE_BASE64" ] || [ -z "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" ] || [ -z "$APPLE_CODESIGN_IDENTITY" ]; then
            echo "Apple signing secrets are required for the macOS release build."
            exit 1
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer_id_application.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/tokenscavenger-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$APPLE_DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Sign macOS binary
        if: matrix.os == 'macos-latest'
        env:
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          BINARY="target/${{ matrix.target }}/release/tokenscavenger"
          codesign --force --timestamp --options runtime --sign "$APPLE_CODESIGN_IDENTITY" "$BINARY"
          codesign --verify --strict --verbose=2 "$BINARY"
          codesign --display --verbose=2 "$BINARY"

      - name: Archive binary
        shell: bash
        run: |
          TARGET_DIR="target/${{ matrix.target }}/release"
          BINARY="$TARGET_DIR/tokenscavenger${{ matrix.suffix }}"
          ARCHIVE_NAME="tokenscavenger-v${{ needs.prepare.outputs.new_version }}-${{ matrix.target }}${{ matrix.suffix }}"
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            cp "$BINARY" "tokenscavenger"
            chmod +x "tokenscavenger"
            ditto -c -k --keepParent "tokenscavenger" "$ARCHIVE_NAME.zip"
            ARCHIVE_NAME="$ARCHIVE_NAME.zip"
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "$BINARY" "$ARCHIVE_NAME"
          else
            cp "$BINARY" "$ARCHIVE_NAME"
            chmod +x "$ARCHIVE_NAME"
          fi
          echo "archive=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
        id: archive

      - name: Notarize macOS archive
        if: matrix.os == 'macos-latest'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "Apple notarization secrets are required for the macOS release build."
            exit 1
          fi

          xcrun notarytool submit "${{ steps.archive.outputs.archive }}" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.archive }}
          path: ${{ steps.archive.outputs.archive }}

  release:
    name: Create GitHub release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          find dist -type f -name 'tokenscavenger-v*' | sort | while read f; do
            sha256sum "$f" >> checksums.txt
          done
          cat checksums.txt

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: tokenscavenger-${{ needs.prepare.outputs.new_version }}.spdx.json

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            dist/**/tokenscavenger-v*
            checksums.txt
            tokenscavenger-${{ needs.prepare.outputs.new_version }}.spdx.json

      - name: Build release notes
        run: |
          python3 scripts/changelog_release.py extract \
            --file CHANGELOG.md \
            --version "${{ needs.prepare.outputs.new_version }}" \
            > changelog-section.md

          cat > release-notes.md <<'EOF'
          ## TokenScavenger v${{ needs.prepare.outputs.new_version }}

          ### Changes
          EOF
          cat changelog-section.md >> release-notes.md
          cat >> release-notes.md <<'EOF'

          ### Downloads

          | Platform | Binary |
          |----------|--------|
          | Linux (x86_64) | `tokenscavenger-v${{ needs.prepare.outputs.new_version }}-x86_64-unknown-linux-gnu` |
          | macOS (ARM64) | `tokenscavenger-v${{ needs.prepare.outputs.new_version }}-aarch64-apple-darwin.zip` |
          | Windows (x86_64) | `tokenscavenger-v${{ needs.prepare.outputs.new_version }}-x86_64-pc-windows-msvc.exe` |

          ### Checksums (SHA256)

          See `checksums.txt` attached below.

          ### SBOM and Provenance

          This release includes an SPDX SBOM and GitHub artifact attestations for
          the release binaries, checksums, and SBOM.

          ### First Run

          The macOS archive is signed with Developer ID and notarized by Apple.
          Unzip it, then run the binary:

          ```bash
          unzip tokenscavenger-v${{ needs.prepare.outputs.new_version }}-aarch64-apple-darwin.zip
          ./tokenscavenger
          ```

          On first run, TokenScavenger detects the absence of a config file and walks
          you through an interactive setup wizard to create `~/.config/tokenscavenger/tokenscavenger.toml`.

          To reconfigure later:

          ```bash
          ./tokenscavenger config
          ```

          Or use the operator web UI at `http://localhost:8000/ui` — changes take effect
          without restarting the application.
          EOF
          cat release-notes.md

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.new_version }}
          name: v${{ needs.prepare.outputs.new_version }}
          body_path: release-notes.md
          files: |
            dist/**/tokenscavenger-v*
            checksums.txt
            tokenscavenger-${{ needs.prepare.outputs.new_version }}.spdx.json

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: [prepare, release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require tap token
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is required to update kabudu/homebrew-tap."
            echo "Create a fine-grained GitHub token with contents:write on kabudu/homebrew-tap."
            exit 1
          fi

      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: kabudu/homebrew-tap
          ref: master
          path: homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Download release checksums
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "v${{ needs.prepare.outputs.new_version }}" \
            --repo "${{ github.repository }}" \
            --pattern checksums.txt \
            --output checksums.txt \
            --clobber
          cat checksums.txt

      - name: Update formula
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from textwrap import dedent

          version = "${{ needs.prepare.outputs.new_version }}"
          checksums = Path("checksums.txt").read_text().splitlines()

          def checksum_for(name: str) -> str:
              matches = [
                  line.split()[0]
                  for line in checksums
                  if line.split(maxsplit=1)[1].endswith(name)
              ]
              if len(matches) != 1:
                  raise SystemExit(f"Expected exactly one checksum for {name}, found {len(matches)}")
              return matches[0]

          mac_name = f"tokenscavenger-v{version}-aarch64-apple-darwin.zip"
          linux_name = f"tokenscavenger-v{version}-x86_64-unknown-linux-gnu"
          mac_sha = checksum_for(mac_name)
          linux_sha = checksum_for(linux_name)

          formula = Path("homebrew-tap/Formula/tokenscavenger.rb")
          formula.write_text(dedent(f'''\
          class Tokenscavenger < Formula
            desc "Self-hosted OpenAI-compatible LLM proxy/router"
            homepage "https://github.com/kabudu/token-scavenger"

            on_macos do
              on_arm do
                url "https://github.com/kabudu/token-scavenger/releases/download/v{version}/{mac_name}"
                sha256 "{mac_sha}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/kabudu/token-scavenger/releases/download/v{version}/{linux_name}"
                sha256 "{linux_sha}"
              end
            end

            def install
              candidate = Dir["tokenscavenger*"].find {{ |path| File.file?(path) }}
              odie "tokenscavenger release binary was not found" unless candidate

              bin.install candidate => "tokenscavenger"
            end

            service do
              run [opt_bin/"tokenscavenger", "--config", "#{{etc}}/tokenscavenger/tokenscavenger.toml"]
              keep_alive true
              working_dir var
              log_path var/"log/tokenscavenger.log"
              error_log_path var/"log/tokenscavenger.err.log"
            end

            test do
              assert_match "tokenscavenger", shell_output("#{{bin}}/tokenscavenger --help")
            end
          end
          '''))
          PY

      - name: Validate formula syntax
        working-directory: homebrew-tap
        run: ruby -c Formula/tokenscavenger.rb

      - name: Commit and push formula
        working-directory: homebrew-tap
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Formula/tokenscavenger.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already points at v${{ needs.prepare.outputs.new_version }}"
            exit 0
          fi
          git commit -m "tokenscavenger ${{ needs.prepare.outputs.new_version }}"
          git push origin HEAD:master
