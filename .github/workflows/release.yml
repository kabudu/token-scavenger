name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version selection"
        required: true
        type: choice
        default: current
        options:
          - current
          - patch
          - minor
          - major

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Select version & tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit
        run: cargo install cargo-edit

      - name: Select release version
        id: bump
        run: |
          if [ "${{ github.event.inputs.bump_type }}" != "current" ]; then
            cargo set-version --bump ${{ github.event.inputs.bump_type }}
          fi

          NEW_VER=$(cargo metadata --format-version=1 --no-deps 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['packages'][0]['version'])")
          echo "new_version=$NEW_VER" >> "$GITHUB_OUTPUT"
          echo "Preparing release v$NEW_VER"

          git config user.name "github-actions"
          git config user.email "actions@github.com"
          if [ "${{ github.event.inputs.bump_type }}" != "current" ]; then
            git add Cargo.toml Cargo.lock 2>/dev/null || git add Cargo.toml
            git commit -m "chore: bump version to v$NEW_VER" || echo "Nothing to commit"
            git push origin HEAD:${{ github.ref_name }}
          fi

          if git rev-parse "v$NEW_VER" >/dev/null 2>&1; then
            echo "Tag v$NEW_VER already exists — aborting"
            exit 1
          fi
          git tag "v$NEW_VER"
          git push origin "v$NEW_VER"

  build:
    name: Build (${{ matrix.target }})
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Archive binary
        shell: bash
        run: |
          TARGET_DIR="target/${{ matrix.target }}/release"
          BINARY="$TARGET_DIR/tokenscavenger${{ matrix.suffix }}"
          ARCHIVE_NAME="tokenscavenger-v${{ needs.prepare.outputs.new_version }}-${{ matrix.target }}${{ matrix.suffix }}"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp "$BINARY" "$ARCHIVE_NAME"
          else
            cp "$BINARY" "$ARCHIVE_NAME"
            chmod +x "$ARCHIVE_NAME"
          fi
          echo "archive=$ARCHIVE_NAME" >> "$GITHUB_OUTPUT"
        id: archive

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.archive.outputs.archive }}
          path: ${{ steps.archive.outputs.archive }}

  release:
    name: Create GitHub release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.prepare.outputs.new_version }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate checksums
        run: |
          find dist -type f -name 'tokenscavenger-v*' | sort | while read f; do
            sha256sum "$f" >> checksums.txt
          done
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.new_version }}
          name: v${{ needs.prepare.outputs.new_version }}
          body: |
            ## TokenScavenger v${{ needs.prepare.outputs.new_version }}

            ### Downloads

            | Platform | Binary |
            |----------|--------|
            | Linux (x86_64) | `tokenscavenger-v${{ needs.prepare.outputs.new_version }}-x86_64-unknown-linux-gnu` |
            | macOS (ARM64) | `tokenscavenger-v${{ needs.prepare.outputs.new_version }}-aarch64-apple-darwin` |
            | Windows (x86_64) | `tokenscavenger-v${{ needs.prepare.outputs.new_version }}-x86_64-pc-windows-msvc.exe` |

            ### Checksums (SHA256)

            See `checksums.txt` attached below.

            ### First Run

            ```bash
            ./tokenscavenger
            ```

            On first run, TokenScavenger detects the absence of a config file and walks
            you through an interactive setup wizard to create `~/.config/tokenscavenger/tokenscavenger.toml`.

            To reconfigure later:

            ```bash
            ./tokenscavenger config
            ```

            Or use the operator web UI at `http://localhost:8000/ui` — changes take effect
            without restarting the application.
          generate_release_notes: true
          files: |
            dist/**/tokenscavenger-v*
            checksums.txt
